apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: redis
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: database
    component: redis 
spec:
    replicas: 1
    selector:
     # using these labels replica set selects the pod
      matchLabels:  
        project: roboshop
        tier: database
        component: redis
         # This is pod definition, pod is subset of replicaset
    template:
      metadata:
       namespace: roboshop
       labels:
        project: roboshop
        tier: database
        component: redis
      spec:
        containers:
        - name: redis
          image: redis:7.0
          imagePullPolicy: Always #safe to pull everytime, there maybe images with same version rebuilt and pushed 
---          
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: redis
  labels:
        project: roboshop
        tier: database
        component: redis
spec:
  selector:
    # labels are used as delectors
        project: roboshop
        tier: database
        component: redis
  ports:
  - protocol: TCP
    port: 6379 #sevice port (internal cluster IP)
    targetPort: 6379  # container port (must match your Pod's containerPort)