apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    component: rabbitmq  
data:
  RABBITMQ_DEFAULT_USER: roboshop 
  RABBITMQ_DEFAULT_PASS: roboshop123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: rabbitmq
  labels:
    project: roboshop
    tier: database
    component: rabbitmq  
spec:
    replicas: 1
    selector:
    # using these labels replica set selects the pod
      matchLabels:  
        project: roboshop
        tier: database
        component: rabbitmq
        # This is pod definition, pod is subset of replicaset
    template:
      metadata:
       namespace: roboshop
       labels:
        project: roboshop
        tier: database
        component: rabbitmq
      spec:
        containers:
        - name: rabbitmq
          image: rabbitmq:3
          envFrom:
          - configMapRef:
               name: rabbitmq
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: rabbitmq
  labels:
        project: roboshop
        tier: database
        component: rabbitmq
spec:
  selector:
    # labels are used as delectors
        project: roboshop
        tier: database
        component: rabbitmq
  ports:
  - protocol: TCP
    port: 5672 #sevice port (internal cluster IP)
    targetPort: 5672   # container port (must match your Pod's containerPort)          