apiVersion: v1
kind: ConfigMap
metadata: 
  name: user
  namespace: roboshop
  labels: 
    project: roboshop
    tier: backend
    component: user
data:
 MONGO: true
 REDIS_URL: 'redis://redis:6379'
 MONGO_URL: "mongodb://mongodb:27017/users"
---  
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: user
  labels:
    project: roboshop
    tier: backend
    component: user 
spec:
    replicas: 1
    selector:
      matchLabels:  
        project: roboshop
        tier: backend
        component: user
    template:
      metadata:
       namespace: roboshop
       labels:
        project: roboshop
        tier: backend
        component: user
      spec:
        containers:
        - name: user
          image: gaddamakhil/user:1.4.0
          imagePullPolicy: Always #safe to pull everytime, there maybe images with same version rebuilt and pushed 
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"  
          readinessProbe:
            #  httpGet:
            #     path: /health
            #     port: 8080 
             tcpSocket:
                port: 8080
             failureThreshold: 2
             periodSeconds: 10
             initialDelaySeconds: 15
          livenessProbe:
             httpGet:
                path: /health
                port: 8080
             failureThreshold: 2
             periodSeconds: 10
          envFrom:
          - configMapRef:  
              name: user  
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: user
  labels:
        project: roboshop
        tier: backend
        component: user
spec:
  selector:
    # labels are used as delectors
        project: roboshop
        tier: backend
        component: user
  ports:
  - protocol: TCP
    port: 8080 #sevice port (internal cluster IP)
    targetPort: 8080  # container port (must match your Pod's containerPort)