apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: mongodb
  labels:
    project: roboshop
    tier: database
    component: mongodb
  annotations: 
    kubernetes.io/change-cause: "starting with 1.0.0"  
spec:
    replicas: 1
    selector:
      matchLabels:  
        project: roboshop
        tier: database
        component: mongodb
    template:
      metadata:
       namespace: roboshop
       labels:
        project: roboshop
        tier: database
        component: mongodb
      spec:
        containers:
        - name: mongodb
          image: gaddamakhil/mongodb:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: mongodb
  labels:
        project: roboshop
        tier: database
        component: mongodb
spec:
  selector:
    # labels are used as delectors
        project: roboshop
        tier: database
        component: mongodb
  ports:
  - protocol: TCP
    port: 27017 #sevice port (internal cluster IP)
    targetPort: 27017   # container port (must match your Pod's containerPort)          