apiVersion: v1
kind: ConfigMap
metadata: 
  name: cart
  namespace: roboshop
  labels: 
    project: roboshop
    tier: backend
    component: cart
data:
 REDIS_HOST: "redis"
 CATALOGUE_HOST: "catalogue"
 CATALOGUE_PORT: "8080"
---  
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: cart
  labels:
    project: roboshop
    tier: backend
    component: cart 
spec:
    replicas: 1
    selector:
      matchLabels:  
        project: roboshop
        tier: backend
        component: cart
    template:
      metadata:
       namespace: roboshop
       labels:
        project: roboshop
        tier: backend
        component: cart
      spec:
        containers:
        - name: cart
          image: gaddamakhil/cart:1.4.0
          imagePullPolicy: Always #safe to pull everytime, there maybe images with same version rebuilt and pushed 
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"  
          readinessProbe:
            #  httpGet:
            #     path: /health
            #     port: 8080 
             tcpSocket:
                port: 8080
             failureThreshold: 2
             periodSeconds: 10
             initialDelaySeconds: 15
          livenessProbe:
             httpGet:
                path: /health
                port: 8080
             failureThreshold: 2
             periodSeconds: 10
          envFrom:
          - configMapRef:  
              name: cart  
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: cart
  labels:
        project: roboshop
        tier: backend
        component: cart
spec:
  selector:
    # labels are used as delectors
        project: roboshop
        tier: backend
        component: cart
  ports:
  - protocol: TCP
    port: 8080 #sevice port (internal cluster IP)
    targetPort: 8080  # container port (must match your Pod's containerPort)